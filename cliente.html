<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Três Marias — Jóias em Prata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #bdd6e8;
    --bg-soft: #c9deee;
    --bg-deep: #a9c6dd;
    --card: #ffffff;
    --card-border: #9fbed4;
    --ink: #4a5560;
    --ink-soft: #6c7a87;
    --ink-faint: #8fa0ad;
    --gold: #8a7458;
    --gold-dim: #a6906f;
    --radius: 2px;
  }
  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0; background: var(--bg); color: var(--ink);
    font-family:'Jost', sans-serif; -webkit-font-smoothing: antialiased; min-height:100vh;
  }
  body::before{
    content:""; position: fixed; inset:0; pointer-events:none;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(255,255,255,0.45), transparent 45%),
      radial-gradient(circle at 90% 90%, rgba(255,255,255,0.25), transparent 50%);
    z-index:0;
  }
  h1,h2,h3,.display{ font-family:'Cormorant Garamond', serif; font-weight:500; letter-spacing:0.01em; }

  header{
    position:relative; z-index:1; padding: 56px 24px 36px; text-align:center;
    border-bottom: 1px solid var(--card-border);
  }
  header .brand-name{
    font-family:'Cormorant Garamond', serif; font-weight:500;
    font-size: clamp(30px, 5vw, 42px); letter-spacing: 0.05em; color: var(--ink);
    margin: 4px 0 2px;
  }
  header .brand-sub{
    font-size: 11px; letter-spacing:0.28em; text-transform:uppercase;
    color: var(--gold); margin-bottom: 26px; font-weight:500;
  }

  header .eyebrow{ font-size: 11px; letter-spacing:0.22em; text-transform:uppercase; color: var(--gold); margin-bottom:12px; font-weight:500; }
  header h1{ font-size: clamp(28px,4.6vw,46px); margin:0; color: var(--ink); line-height:1.18; max-width: 640px; margin-left:auto; margin-right:auto; }
  header p.sub{ margin: 16px auto 0; max-width: 480px; color: var(--ink-soft); font-size: 15px; line-height: 1.6; }

  .divider-orn{ display:flex; align-items:center; justify-content:center; gap:10px; margin: 18px 0 0; }
  .divider-orn .ln{ height:1px; width:34px; background: var(--card-border); }
  .divider-orn .dot{ width:4px; height:4px; border-radius:50%; background: var(--gold); transform: rotate(45deg); }

  .toolbar{
    position: sticky; top:0; z-index:10;
    background: rgba(189,214,232,0.88); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--card-border);
    padding: 14px 24px; display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap;
  }
  .filter-pill{
    background: transparent; border: 1px solid var(--card-border); color: var(--ink-soft);
    padding: 8px 18px; border-radius: 999px; font-family:'Jost'; font-size:13px; letter-spacing:0.03em;
    cursor:pointer; transition: all .2s ease; white-space:nowrap;
  }
  .filter-pill:hover{ border-color: var(--gold); color: var(--ink); }
  .filter-pill.active{ background: var(--ink); color: #fff; border-color: var(--ink); }

  main{ position:relative; z-index:1; max-width: 1180px; margin:0 auto; padding: 40px 24px 80px; min-height: 50vh; }

  .category-block{ margin-bottom: 52px; }
  .category-block:last-child{ margin-bottom:0; }
  .category-title{ display:flex; align-items:baseline; gap:16px; margin-bottom:22px; }
  .category-title h2{ font-size:26px; color: var(--ink); margin:0; white-space:nowrap; }
  .category-title .line{ flex:1; height:1px; background: var(--card-border); }
  .category-title .count{ font-size:12px; color: var(--ink-faint); letter-spacing:0.05em; }

  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 22px; }

  .card{
    background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius);
    overflow:hidden; position:relative; transition: border-color .25s ease, transform .25s ease, box-shadow .25s ease;
    box-shadow: 0 1px 3px rgba(74,85,96,0.06);
  }
  .card:hover{ border-color: var(--gold-dim); transform: translateY(-3px); box-shadow: 0 10px 24px rgba(74,85,96,0.12); }
  .card::after{
    content:""; position:absolute; inset:0; border-radius: var(--radius);
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.5) 50%, transparent 70%);
    background-size: 220% 220%; background-position: 120% 0; opacity:0; transition: opacity .2s ease; pointer-events:none;
  }
  .card:hover::after{ opacity:1; animation: glint 1.1s ease forwards; }
  @keyframes glint{ from{background-position:120% 0;} to{background-position:-20% 0;} }
  @media (prefers-reduced-motion: reduce){ .card:hover::after{animation:none;opacity:0;} .card:hover{transform:none;} }

  .card .imgwrap{ width:100%; aspect-ratio:1/1; background: var(--bg-soft); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  .card .imgwrap img{ width:100%; height:100%; object-fit:cover; display:none; }
  .card .imgwrap img.is-active{ display:block; }
  .card .imgwrap .placeholder{ color: var(--ink-faint); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; }

  .card .carousel-arrow{
    position:absolute; top:50%; transform: translateY(-50%); z-index:2;
    width:28px; height:28px; border-radius:50%; border:none; cursor:pointer;
    background: rgba(255,255,255,0.85); color: var(--ink); font-family:'Jost';
    font-size:16px; line-height:1; display:flex; align-items:center; justify-content:center;
    opacity:0; transition: opacity .2s ease, background .2s ease;
  }
  .card:hover .carousel-arrow{ opacity:1; }
  .card .carousel-arrow:hover{ background: #fff; }
  .card .carousel-arrow.prev{ left:8px; }
  .card .carousel-arrow.next{ right:8px; }
  /* em telas de toque (sem hover confiável), deixa as setas sempre visíveis */
  @media (hover: none){ .card .carousel-arrow{ opacity:1; } }

  .card .carousel-dots{
    position:absolute; bottom:8px; left:0; right:0; z-index:2;
    display:flex; justify-content:center; gap:5px;
  }
  .card .carousel-dots .dot{
    width:5px; height:5px; border-radius:50%; background: rgba(255,255,255,0.6);
    border: 1px solid rgba(74,85,96,0.25); transition: background .2s ease;
  }
  .card .carousel-dots .dot.is-active{ background: var(--ink); }

  .card .body{ padding: 16px 16px 18px; }
  .card .cat-tag{ font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color: var(--gold); margin-bottom:6px; display:block; }
  .card h3{ font-size:19px; margin:0 0 8px; color: var(--ink); line-height:1.25; }
  .card .price{ font-family:'Jost'; font-size:18px; font-weight:500; color: var(--ink); letter-spacing:0.01em; }
  .card .price small{ font-size:11px; color: var(--ink-faint); font-weight:400; margin-right:3px; }

  .empty{ text-align:center; padding: 90px 24px; color: var(--ink-soft); }
  .empty .display{ font-size:28px; color: var(--ink); margin-bottom:10px; }
  .empty p{ font-size:14px; max-width:380px; margin:0 auto; line-height:1.6; }

  .skeleton-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap:22px; }
  .skeleton-card{ background: var(--card); border:1px solid var(--card-border); border-radius: var(--radius); overflow:hidden; }
  .skeleton-card .imgwrap{ width:100%; aspect-ratio:1/1; background: linear-gradient(100deg, var(--bg-soft) 30%, var(--card-border) 50%, var(--bg-soft) 70%); background-size:200% 100%; animation: pulse 1.4s ease-in-out infinite; }
  .skeleton-card .body{ padding:16px; }
  .skeleton-card .line{ height:10px; border-radius:2px; background: var(--card-border); margin-bottom:8px; width:70%; }
  @keyframes pulse{ 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

  footer{
    text-align:center; padding: 30px 24px 40px; color: var(--ink-faint); font-size:12px;
    letter-spacing:0.06em; border-top: 1px solid var(--card-border); position:relative; z-index:1;
  }
  footer .foot-brand{ font-family:'Cormorant Garamond', serif; color: var(--ink-soft); font-size:14px; letter-spacing:0.08em; margin-bottom:4px; }
</style>
</head>
<body>

<header>
  <div class="brand-name">Três Marias</div>
  <div class="brand-sub">Jóias em Prata</div>

  <div class="divider-orn"><span class="ln"></span><span class="dot"></span><span class="ln"></span></div>

  <h1 style="margin-top:22px;">Peças que contam histórias —<br>encontre a sua entre <span style="color:var(--gold); font-style:italic;">pratas</span> selecionadas a dedo.</h1>
  <p class="sub">Cada detalhe pensado para iluminar momentos. Preço e disponibilidade sempre atualizados.</p>
</header>

<div class="toolbar" id="toolbar"></div>

<main id="main">
  <div class="skeleton-grid" id="skeleton">
    <div class="skeleton-card"><div class="imgwrap"></div><div class="body"><div class="line" style="width:40%"></div><div class="line" style="width:80%"></div><div class="line" style="width:30%"></div></div></div>
    <div class="skeleton-card"><div class="imgwrap"></div><div class="body"><div class="line" style="width:40%"></div><div class="line" style="width:80%"></div><div class="line" style="width:30%"></div></div></div>
    <div class="skeleton-card"><div class="imgwrap"></div><div class="body"><div class="line" style="width:40%"></div><div class="line" style="width:80%"></div><div class="line" style="width:30%"></div></div></div>
  </div>
</main>

<footer>
  <div class="foot-brand">Três Marias</div>
  Catálogo atualizado em tempo real
</footer>

<script>
(function(){
  "use strict";

  // URL relativa: funciona automaticamente tanto rodando local
  // (http://localhost:3001) quanto hospedado (ex: https://seusite.onrender.com),
  // porque "/api" se completa com o endereço de onde esta página foi aberta.
  var API_URL = "/api";
  var CATEGORY_ORDER = ["Anéis","Colares","Brincos","Pulseiras","Pingentes","Outros"];
  var products = [];
  var activeFilter = "Todos";
  var firstLoad = true;

  function escapeHtml(str){
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
  function fmtPrice(v){
    return Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  async function fetchProducts(){
    var res = await fetch(API_URL + '/produtos');
    if(!res.ok) throw new Error('Falha ao buscar produtos');
    return res.json();
  }

  function renderToolbar(){
    var toolbar = document.getElementById('toolbar');
    toolbar.innerHTML = '';
    var cats = ["Todos"];
    CATEGORY_ORDER.forEach(function(c){
      if(products.some(function(p){ return p.categoria === c; })) cats.push(c);
    });
    cats.forEach(function(c){
      var btn = document.createElement('button');
      btn.className = 'filter-pill' + (c === activeFilter ? ' active' : '');
      btn.type = 'button';
      btn.textContent = c;
      btn.addEventListener('click', function(){
        activeFilter = c;
        renderToolbar();
        renderCatalog();
      });
      toolbar.appendChild(btn);
    });
  }

  var carouselPositions = {}; // guarda em qual foto cada peça estava parada, para não resetar a cada atualização automática

  function renderCatalog(){
    var main = document.getElementById('main');
    main.innerHTML = '';

    var visible = products.filter(function(p){
      return activeFilter === 'Todos' || p.categoria === activeFilter;
    });

    if(products.length === 0){
      main.innerHTML =
        '<div class="empty"><div class="display">A vitrine está vazia</div>' +
        '<p>Em breve novas peças serão adicionadas ao catálogo.</p></div>';
      return;
    }

    if(visible.length === 0){
      main.innerHTML =
        '<div class="empty"><div class="display">Nada em "' + escapeHtml(activeFilter) + '"</div>' +
        '<p>Ainda não há peças cadastradas nessa categoria.</p></div>';
      return;
    }

    var groups = {};
    visible.forEach(function(p){
      if(!groups[p.categoria]) groups[p.categoria] = [];
      groups[p.categoria].push(p);
    });

    var orderedCats = CATEGORY_ORDER.filter(function(c){ return groups[c]; });

    orderedCats.forEach(function(cat){
      var block = document.createElement('section');
      block.className = 'category-block';
      var title = document.createElement('div');
      title.className = 'category-title';
      title.innerHTML =
        '<h2>' + escapeHtml(cat) + '</h2><div class="line"></div>' +
        '<span class="count">' + groups[cat].length + (groups[cat].length===1?' peça':' peças') + '</span>';
      block.appendChild(title);

      var grid = document.createElement('div');
      grid.className = 'grid';
      groups[cat].forEach(function(p){
        var card = document.createElement('article');
        card.className = 'card';

        var fotos = p.fotos && p.fotos.length ? p.fotos : (p.foto ? [p.foto] : []);
        var posInicial = carouselPositions[p.id] || 0;
        if(posInicial >= fotos.length) posInicial = 0;

        var imgsHtml = fotos.length
          ? fotos.map(function(url, i){
              return '<img src="'+url+'" alt="'+escapeHtml(p.nome)+'" loading="lazy" class="'+(i===posInicial?'is-active':'')+'" data-idx="'+i+'">';
            }).join('')
          : '<span class="placeholder">Sem foto</span>';

        var arrowsHtml = '';
        var dotsHtml = '';
        if(fotos.length > 1){
          arrowsHtml =
            '<button type="button" class="carousel-arrow prev" aria-label="Foto anterior">‹</button>' +
            '<button type="button" class="carousel-arrow next" aria-label="Próxima foto">›</button>';
          dotsHtml = '<div class="carousel-dots">' +
            fotos.map(function(_, i){ return '<span class="dot'+(i===posInicial?' is-active':'')+'" data-idx="'+i+'"></span>'; }).join('') +
            '</div>';
        }

        card.innerHTML =
          '<div class="imgwrap" data-current="'+posInicial+'" data-total="'+fotos.length+'">' +
            imgsHtml + arrowsHtml + dotsHtml +
          '</div>' +
          '<div class="body">' +
            '<span class="cat-tag">'+escapeHtml(p.categoria)+'</span>' +
            '<h3>'+escapeHtml(p.nome)+'</h3>' +
            '<div class="price"><small>R$</small>'+fmtPrice(p.preco)+'</div>' +
          '</div>';

        grid.appendChild(card);

        if(fotos.length > 1){
          setupCarousel(card.querySelector('.imgwrap'), p.id);
        }
      });
      block.appendChild(grid);
      main.appendChild(block);
    });
  }

  function setupCarousel(imgwrap, productId){
    var total = parseInt(imgwrap.getAttribute('data-total'), 10);
    var imgs = imgwrap.querySelectorAll('img');
    var dots = imgwrap.querySelectorAll('.carousel-dots .dot');

    function goTo(idx){
      idx = ((idx % total) + total) % total; // garante índice sempre dentro do intervalo, mesmo voltando do 0
      imgwrap.setAttribute('data-current', idx);
      carouselPositions[productId] = idx;
      imgs.forEach(function(img){ img.classList.toggle('is-active', parseInt(img.getAttribute('data-idx'),10) === idx); });
      dots.forEach(function(dot){ dot.classList.toggle('is-active', parseInt(dot.getAttribute('data-idx'),10) === idx); });
    }

    var prevBtn = imgwrap.querySelector('.carousel-arrow.prev');
    var nextBtn = imgwrap.querySelector('.carousel-arrow.next');
    if(prevBtn) prevBtn.addEventListener('click', function(e){
      e.preventDefault(); e.stopPropagation();
      goTo(parseInt(imgwrap.getAttribute('data-current'),10) - 1);
    });
    if(nextBtn) nextBtn.addEventListener('click', function(e){
      e.preventDefault(); e.stopPropagation();
      goTo(parseInt(imgwrap.getAttribute('data-current'),10) + 1);
    });
    dots.forEach(function(dot){
      dot.addEventListener('click', function(e){
        e.preventDefault(); e.stopPropagation();
        goTo(parseInt(dot.getAttribute('data-idx'),10));
      });
    });
  }

  function renderError(){
    var main = document.getElementById('main');
    main.innerHTML =
      '<div class="empty"><div class="display">Catálogo indisponível</div>' +
      '<p>Não foi possível conectar à loja agora. Tente novamente em alguns instantes.</p></div>';
    document.getElementById('toolbar').innerHTML = '';
  }

  async function refresh(){
    try{
      var data = await fetchProducts();
      products = data;
      renderToolbar();
      renderCatalog();
    }catch(e){
      if(firstLoad) renderError();
      // se já tinha carregado antes, mantém o que estava na tela em vez de quebrar
    }
    firstLoad = false;
  }

  refresh();
  // atualiza sozinho a cada 5s para refletir novas peças cadastradas pelo admin
  setInterval(refresh, 5000);
})();
</script>

</body>
</html>
